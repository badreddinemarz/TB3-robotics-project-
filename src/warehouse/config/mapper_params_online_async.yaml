slam_toolbox:
  ros__parameters:
    use_sim_time: true
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    mode: mapping
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    resolution: 0.05
    max_laser_range: 3.5
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    map_update_interval: 2.0
    do_loop_closing: true
